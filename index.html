<!--
  CoffeeRun — versão ONLINE (Supabase).
  Dados ficam num banco Postgres do Supabase, compartilhado entre todos,
  com atualização em tempo real. Pronto para hospedar (Netlify/Cloudflare/GitHub Pages).

  >>> CONFIGURE SUAS CHAVES logo abaixo, na seção CONFIG <<<
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CoffeeRun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800;900&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<!-- cliente Supabase (expõe a global `supabase`) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
    --espresso:#17100B;
    --espresso-2:#211710;
    --espresso-3:#2C1F15;
    --paper:#F4EAD5;
    --paper-2:#E8D8B8;
    --ink:#2A1C12;
    --ink-soft:#5A442F;
    --crema:#D6A45C;
    --crema-deep:#B47B33;
    --stamp:#C23B22;
    --stamp-deep:#9E2C16;
    --led:#FFC247;
    --led-dim:#5b4214;
    --muted:#A38B6E;
    --line:rgba(214,164,92,.16);
    --ok:#7FB069;
    --shadow:0 18px 40px -22px rgba(0,0,0,.8);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, #251a12 0%, transparent 60%),
      var(--espresso);
    color:var(--paper);
    font-family:"Space Mono",ui-monospace,monospace;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    padding:0 14px env(safe-area-inset-bottom,14px);
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.04;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  .wrap{max-width:520px;margin:0 auto;position:relative;z-index:1;padding-bottom:96px}

  .topbar{display:flex;align-items:center;gap:10px;padding:16px 2px 10px}
  .brand{display:flex;align-items:baseline;gap:8px;flex:1;min-width:0}
  .brand .mark{font-family:"Archivo",sans-serif;font-weight:900;font-size:24px;letter-spacing:-.5px;color:var(--paper);line-height:1}
  .brand .mark b{color:var(--crema)}
  .brand .tag{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
  .who{display:flex;align-items:center;gap:8px;background:var(--espresso-2);border:1px solid var(--line);border-radius:999px;padding:5px 6px 5px 11px;cursor:pointer;max-width:48%}
  .who:hover{border-color:var(--crema-deep)}
  .who .av{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-family:"Archivo";font-weight:800;font-size:11px;color:var(--espresso);flex:none}
  .who .nm{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .who .cv{color:var(--muted);font-size:10px}

  .tabs{position:fixed;left:0;right:0;bottom:0;z-index:20;display:flex;gap:4px;justify-content:center;padding:8px 12px calc(8px + env(safe-area-inset-bottom,0));background:linear-gradient(0deg,var(--espresso) 70%,transparent)}
  .tab{flex:1;max-width:150px;border:1px solid var(--line);background:var(--espresso-2);color:var(--muted);border-radius:14px;padding:9px 6px;cursor:pointer;font-family:"Space Mono";font-size:11px;font-weight:700;letter-spacing:.5px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.15s}
  .tab .ic{font-size:16px;line-height:1}
  .tab[aria-selected="true"]{background:var(--crema);color:var(--espresso);border-color:var(--crema)}

  .ticket{background:var(--paper);color:var(--ink);border-radius:6px;position:relative;box-shadow:var(--shadow);padding:18px 18px 22px;margin-top:6px;background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(42,28,18,.05) 27px,rgba(42,28,18,.05) 28px)}
  .ticket::before,.ticket::after{content:"";position:absolute;left:0;right:0;height:10px;background-size:16px 16px;background-position:center}
  .ticket::before{top:-5px;background-image:radial-gradient(circle at 8px 10px,var(--espresso) 5px,transparent 6px)}
  .ticket::after{bottom:-5px;background-image:radial-gradient(circle at 8px 0px,var(--espresso) 5px,transparent 6px)}
  .rcpt-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px dashed rgba(42,28,18,.35);padding-bottom:12px}
  .rcpt-head h2{font-family:"Archivo";font-weight:900;font-size:15px;margin:0;letter-spacing:.5px;text-transform:uppercase}
  .rcpt-head .sub{font-size:10px;color:var(--ink-soft);margin-top:3px;letter-spacing:1px}
  .clock{text-align:right;font-family:"Space Mono";font-weight:700}
  .clock .time{display:inline-block;background:var(--espresso);color:var(--led);padding:4px 8px;border-radius:5px;font-size:20px;letter-spacing:1px;box-shadow:inset 0 0 0 1px rgba(255,194,71,.25), 0 0 14px rgba(255,194,71,.12)}
  .clock .date{font-size:10px;color:var(--ink-soft);margin-top:4px;letter-spacing:1px;text-transform:uppercase}

  .punch-zone{display:flex;flex-direction:column;align-items:center;padding:18px 0 6px}
  .punch{--d:150px;width:var(--d);height:var(--d);border-radius:50%;cursor:pointer;border:none;background:radial-gradient(circle at 35% 30%,#E8542F,var(--stamp) 55%,var(--stamp-deep));color:#fff;font-family:"Archivo";font-weight:900;text-transform:uppercase;box-shadow:0 10px 0 var(--stamp-deep), 0 18px 30px -10px rgba(158,44,22,.7);display:grid;place-items:center;line-height:1.05;letter-spacing:.5px;transition:transform .08s, box-shadow .08s;position:relative;isolation:isolate}
  .punch span{font-size:15px}
  .punch small{display:block;font-size:9px;font-weight:700;opacity:.85;letter-spacing:1px;margin-top:3px;font-family:"Space Mono"}
  .punch:active{transform:translateY(8px);box-shadow:0 2px 0 var(--stamp-deep),0 6px 14px -8px rgba(158,44,22,.7)}
  .punch:disabled{background:radial-gradient(circle at 35% 30%,#cdbfa8,#a8957a 60%,#8c7a5f);box-shadow:0 8px 0 #6f5f49;cursor:not-allowed}
  .punch .ring{position:absolute;inset:-9px;border:2px dashed rgba(244,234,213,.35);border-radius:50%}
  .cooldown{margin-top:14px;text-align:center;font-size:11px;color:var(--ink-soft)}
  .cooldown b{font-family:"Archivo";font-size:16px;color:var(--stamp);letter-spacing:1px}
  .hint{font-size:10px;color:var(--ink-soft);margin-top:4px;letter-spacing:.5px}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:18px;border-top:2px dashed rgba(42,28,18,.35);padding-top:14px}
  .stat{text-align:center}
  .stat .n{font-family:"Archivo";font-weight:900;font-size:24px;color:var(--ink);line-height:1}
  .stat .l{font-size:9px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:1px;margin-top:4px}

  .loyalty{margin-top:16px}
  .loyalty .lt{font-size:10px;color:var(--ink-soft);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;display:flex;justify-content:space-between}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px}
  .cell{aspect-ratio:1;border-radius:6px;border:1.5px dashed rgba(42,28,18,.25);display:grid;place-items:center}
  .cell.on{border:1.5px solid transparent}
  .cell.on svg{filter:drop-shadow(0 1px 0 rgba(0,0,0,.1))}
  .badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px}
  .badge{display:inline-flex;align-items:center;gap:5px;background:var(--paper-2);border:1px solid rgba(42,28,18,.18);color:var(--ink);border-radius:999px;padding:5px 10px;font-size:11px;font-weight:700}
  .badge .e{font-size:13px}
  .badge.locked{opacity:.4;filter:grayscale(1)}

  .panel{background:var(--espresso-2);border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:14px}
  .panel h3{font-family:"Archivo";font-weight:800;font-size:13px;letter-spacing:1px;text-transform:uppercase;margin:0 0 4px;color:var(--paper)}
  .panel .psub{font-size:10px;color:var(--muted);margin-bottom:12px;letter-spacing:.5px}
  .king{background:linear-gradient(135deg,#3a2a14,#241a10);border:1px solid var(--crema-deep);border-radius:14px;padding:16px;margin-top:14px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
  .king::after{content:"👑";position:absolute;right:-6px;top:-10px;font-size:80px;opacity:.12;transform:rotate(15deg)}
  .king .crown{font-size:34px;flex:none}
  .king .ki .t{font-size:10px;letter-spacing:2px;color:var(--crema);text-transform:uppercase}
  .king .ki .n{font-family:"Archivo";font-weight:900;font-size:22px;line-height:1.1}
  .king .ki .m{font-size:11px;color:var(--muted);margin-top:2px}
  .row{display:flex;align-items:center;gap:11px;padding:10px 4px;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:none}
  .row .pos{font-family:"Archivo";font-weight:900;font-size:17px;width:26px;text-align:center;color:var(--muted)}
  .row.me{background:rgba(214,164,92,.08);border-radius:10px;margin:0 -6px;padding-left:10px;padding-right:10px}
  .row.me .pos{color:var(--crema)}
  .av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-family:"Archivo";font-weight:800;font-size:13px;color:var(--espresso);flex:none}
  .row .info{flex:1;min-width:0}
  .row .info .nm{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .info .tm{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .row .pts{font-family:"Archivo";font-weight:900;font-size:16px;color:var(--crema)}
  .row .pts small{font-family:"Space Mono";font-weight:400;font-size:9px;color:var(--muted);display:block;text-align:right}
  .seg{display:flex;gap:6px;background:var(--espresso);border:1px solid var(--line);border-radius:12px;padding:4px;margin-top:14px}
  .seg button{flex:1;border:none;background:transparent;color:var(--muted);font-family:"Space Mono";font-weight:700;font-size:11px;padding:8px;border-radius:9px;cursor:pointer;letter-spacing:.5px}
  .seg button[aria-selected="true"]{background:var(--espresso-3);color:var(--paper)}
  .titles{display:grid;gap:8px;margin-top:8px}
  .ttl{display:flex;align-items:center;gap:11px;background:var(--espresso);border:1px solid var(--line);border-radius:11px;padding:11px}
  .ttl .e{font-size:22px;flex:none}
  .ttl .x{flex:1}
  .ttl .x .h{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--crema)}
  .ttl .x .n{font-family:"Archivo";font-weight:800;font-size:15px;margin-top:1px}
  .ttl .x .d{font-size:10px;color:var(--muted);margin-top:1px}

  .feed-item{background:var(--espresso-2);border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-top:10px}
  .feed-item .fh{display:flex;align-items:center;gap:9px}
  .feed-item .fh .nm{font-size:12px;font-weight:700}
  .feed-item .fh .tt{font-size:10px;color:var(--muted);margin-left:auto;white-space:nowrap}
  .feed-item .ft{font-size:12.5px;color:#E5D6BB;line-height:1.45;margin:8px 0 9px}
  .feed-item .ft b{color:var(--crema)}
  .react{display:flex;gap:7px}
  .react button{background:var(--espresso);border:1px solid var(--line);color:var(--paper);border-radius:999px;font-family:"Space Mono";font-size:12px;padding:4px 11px;cursor:pointer;display:flex;gap:5px;align-items:center;transition:.12s}
  .react button:hover{border-color:var(--crema-deep)}
  .react button.hit{transform:scale(1.12)}
  .react button .c{color:var(--muted);font-weight:700}

  .empty{text-align:center;color:var(--muted);font-size:12px;padding:34px 10px;line-height:1.7}
  .empty .big{font-size:34px;margin-bottom:6px}

  .kiosk{display:flex;gap:12px;align-items:center;background:var(--espresso-2);border:1px dashed var(--crema-deep);border-radius:12px;padding:13px;margin-top:14px}
  .kiosk .qr{width:54px;height:54px;border-radius:8px;background:conic-gradient(#000 0 0) padding-box,var(--paper);flex:none;position:relative;overflow:hidden}
  .kiosk .qr i{position:absolute;background:var(--ink)}
  .kiosk p{margin:0;font-size:11px;color:var(--muted);line-height:1.5}
  .kiosk p b{color:var(--paper)}

  .scrim{position:fixed;inset:0;background:rgba(10,7,4,.7);backdrop-filter:blur(4px);z-index:40;display:none;align-items:flex-end;justify-content:center}
  .scrim.on{display:flex}
  .sheet{background:var(--espresso-2);border:1px solid var(--line);border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:20px 18px calc(24px + env(safe-area-inset-bottom,0));max-height:88vh;overflow:auto}
  @media(min-width:560px){.scrim{align-items:center}.sheet{border-radius:18px}}
  .sheet h3{font-family:"Archivo";font-weight:900;font-size:18px;margin:0 0 3px}
  .sheet .sd{font-size:11px;color:var(--muted);margin-bottom:16px}
  label.fl{display:block;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:12px 0 6px}
  input.fi,select.fi{width:100%;background:var(--espresso);border:1px solid var(--line);color:var(--paper);border-radius:11px;padding:12px 13px;font-family:"Space Mono";font-size:14px}
  input.fi:focus,select.fi:focus{outline:none;border-color:var(--crema)}
  .teamchips{display:flex;flex-wrap:wrap;gap:7px}
  .teamchips button{background:var(--espresso);border:1px solid var(--line);color:var(--paper);border-radius:999px;padding:8px 13px;font-family:"Space Mono";font-size:12px;cursor:pointer;font-weight:700}
  .teamchips button[aria-selected="true"]{background:var(--crema);color:var(--espresso);border-color:var(--crema)}
  .btn{width:100%;border:none;border-radius:12px;padding:14px;font-family:"Archivo";font-weight:800;font-size:14px;letter-spacing:.5px;cursor:pointer;margin-top:18px;background:var(--crema);color:var(--espresso)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--paper);margin-top:8px;font-family:"Space Mono";font-weight:700;font-size:13px}
  .people-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
  .pl-item{display:flex;align-items:center;gap:10px;background:var(--espresso);border:1px solid var(--line);border-radius:11px;padding:9px 11px;cursor:pointer}
  .pl-item:hover{border-color:var(--crema-deep)}
  .pl-item .nm{font-size:13px;font-weight:700;flex:1}
  .pl-item .tm{font-size:10px;color:var(--muted);text-transform:uppercase}
  .row-2{display:flex;gap:10px;align-items:flex-end}
  .gear{background:var(--espresso-2);border:1px solid var(--line);color:var(--muted);width:34px;height:34px;border-radius:10px;cursor:pointer;font-size:15px;flex:none}
  .gear:hover{color:var(--paper)}

  #stamp{position:fixed;inset:0;z-index:60;display:none;place-items:center;pointer-events:none}
  #stamp.on{display:grid}
  #stamp .mk{font-family:"Archivo";font-weight:900;color:var(--stamp);border:5px solid var(--stamp);border-radius:10px;padding:14px 22px;text-transform:uppercase;text-align:center;transform:rotate(-11deg) scale(.4);opacity:0;animation:slam .7s cubic-bezier(.2,1.4,.4,1) forwards;box-shadow:0 0 0 2px rgba(194,59,34,.2);background:rgba(244,234,213,.06);backdrop-filter:blur(1px)}
  #stamp .mk .big{font-size:30px;letter-spacing:1px;line-height:1}
  #stamp .mk .pts{font-family:"Space Mono";font-size:14px;margin-top:6px;color:var(--paper);font-weight:700}
  @keyframes slam{0%{transform:rotate(-11deg) scale(2);opacity:0}25%{opacity:1}45%{transform:rotate(-11deg) scale(.92)}60%{transform:rotate(-11deg) scale(1.02)}100%{transform:rotate(-11deg) scale(1);opacity:1}}
  #stamp.fade .mk{animation:fade .4s ease forwards}
  @keyframes fade{to{opacity:0;transform:rotate(-11deg) scale(1.1)}}

  .toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(20px);z-index:50;background:var(--espresso-3);border:1px solid var(--crema-deep);color:var(--paper);padding:11px 16px;border-radius:12px;font-size:12px;font-weight:700;opacity:0;transition:.25s;max-width:90%;text-align:center}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  /* tela de configuração (quando faltam as chaves) */
  .setup{background:var(--paper);color:var(--ink);border-radius:10px;padding:22px;margin-top:18px;box-shadow:var(--shadow)}
  .setup h2{font-family:"Archivo";font-weight:900;margin:0 0 6px}
  .setup p{font-size:13px;line-height:1.6;color:var(--ink-soft)}
  .setup code{background:#2A1C12;color:var(--crema);padding:2px 6px;border-radius:5px;font-size:12px}
  .setup ol{font-size:13px;line-height:1.8;color:var(--ink-soft);padding-left:20px}
</style>

<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <div>
        <div class="mark">Coffee<b>Run</b></div>
        <div class="tag">bata o ponto do café</div>
      </div>
    </div>
    <button class="gear" id="gearBtn" title="Ajustes">⚙</button>
    <div class="who" id="whoBtn">
      <div class="av" id="whoAv">?</div>
      <div style="min-width:0">
        <div class="nm" id="whoNm">Entrar</div>
        <div class="cv" id="whoCv">toque para escolher</div>
      </div>

  </div>

  <div id="view"></div>
</div>

<nav class="tabs">
  <button class="tab" data-tab="punch" aria-selected="true"><span class="ic">☕</span>Ponto</button>
  <button class="tab" data-tab="rank" aria-selected="false"><span class="ic">🏆</span>Ranking</button>
  <button class="tab" data-tab="feed" aria-selected="false"><span class="ic">💬</span>Feed</button>
</nav>

<script>
/* ============================================================
   ███  CONFIG — COLE SUAS DUAS CHAVES DO SUPABASE AQUI  ███
   Pegue em: app.supabase.com → seu projeto → Project Settings →
   Data API / API Keys. A "anon public key" pode ficar exposta no
   front (é feita pra isso). NÃO use a "service_role".
   ============================================================ */
const SUPABASE_URL      = "https://cofferun.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3bmdnY21yYXhrZ2pnZWh2bmh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3OTA5MDgsImV4cCI6MjA5ODM2NjkwOH0.ZYDQv1URUsxMoQ4MPKd9kSwxUebUXKhtbiUE4kaL9h8";
/* ============================================================ */

const TABLE   = "coffeerun";      // nome da tabela no Supabase
const ROW_ID  = "state";          // guardamos tudo numa linha JSON
const ME_KEY  = "coffeerun_me";   // identidade local (por dispositivo)
const TEAMS   = ["TI","RH","Comercial","Financeiro","Operações","Marketing"];
let SETTINGS  = { cooldownMin: 45 };

let db = null;
function configured(){
  return SUPABASE_URL && !SUPABASE_URL.includes("SEU-PROJETO")
      && SUPABASE_ANON_KEY && !SUPABASE_ANON_KEY.includes("SUA-ANON");
}

/* identidade local (localStorage; funciona quando hospedado) */
let memMe = null;
function getMe(){ try{ return localStorage.getItem(ME_KEY)||null; }catch(e){ return memMe; } }
function setMe(v){ try{ if(v) localStorage.setItem(ME_KEY,v); else localStorage.removeItem(ME_KEY); }catch(e){ memMe=v; } }

/* ---- estado ---- */
let STATE = { people:{}, feed:[], seeded:false, settings:{cooldownMin:45} };
let ME = null;
let activeTab = "punch";
let rankMode = "ind";
let clockTimer = null, pollTimer = null;

/* ---- banco (Supabase) ---- */
async function loadState(){
  try{
    const { data, error } = await db.from(TABLE).select("data").eq("id",ROW_ID).maybeSingle();
    if(error) throw error;
    if(data && data.data){ STATE = data.data; }
    else { STATE = { people:{}, feed:[], seeded:false, settings:SETTINGS }; }
  }catch(e){ console.error("loadState",e); toast("Erro ao ler o banco — confira as chaves/tabela"); }
  if(!STATE.people) STATE.people={};
  if(!STATE.feed) STATE.feed=[];
  if(STATE.settings) SETTINGS=STATE.settings;
  if(!STATE.seeded){ seed(); STATE.seeded=true; await saveState(); }
  ME = getMe(); if(ME && !STATE.people[ME]) ME=null;
}
async function saveState(){
  STATE.settings=SETTINGS;
  try{
    const { error } = await db.from(TABLE).upsert({ id:ROW_ID, data:STATE });
    if(error) throw error;
  }catch(e){ console.error("saveState",e); toast("Erro ao salvar no banco"); }
}

/* realtime: atualiza a tela quando alguém mexe */
function subscribeRealtime(){
  db.channel("coffeerun-state")
    .on("postgres_changes",
        { event:"*", schema:"public", table:TABLE, filter:"id=eq."+ROW_ID },
        payload => { const fresh = payload.new && payload.new.data; if(fresh) applyFresh(fresh); })
    .subscribe();
}
function applyFresh(fresh){
  if(JSON.stringify(fresh)===JSON.stringify(STATE)) return;
  STATE=fresh; if(STATE.settings) SETTINGS=STATE.settings;
  if(document.getElementById("scrim").classList.contains("on")) return; // não mexe com modal aberto
  if(activeTab!=="punch") render(); else renderWho();
}
/* poll de segurança (caso realtime não esteja ligado) */
async function poll(){
  if(document.getElementById("scrim").classList.contains("on")) return;
  try{ const { data } = await db.from(TABLE).select("data").eq("id",ROW_ID).maybeSingle();
    if(data && data.data) applyFresh(data.data); }catch(e){}
}

/* ============================================================
   util de tempo / cálculos
   ============================================================ */
const pad = n => String(n).padStart(2,"0");
const dayKey = ts => { const d=new Date(ts); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); };
const isWeekend = d => { const w=d.getDay(); return w===0||w===6; };
const monthKey = ts => { const d=new Date(ts); return d.getFullYear()+"-"+pad(d.getMonth()+1); };
const thisMonth = monthKey(Date.now());

function monthHistory(p){ return (p.history||[]).filter(h => monthKey(h.ts)===thisMonth); }
function monthPoints(p){ return monthHistory(p).reduce((s,h)=>s+h.pts,0); }
function monthCups(p){ return monthHistory(p).length; }
function lastPunch(p){ const h=p.history||[]; return h.length ? h[h.length-1].ts : 0; }

function currentStreak(p){
  const days = new Set((p.history||[]).map(h=>dayKey(h.ts)));
  let d = new Date(); d.setHours(12,0,0,0);
  while(isWeekend(d)) d.setDate(d.getDate()-1);
  if(!days.has(dayKey(d.getTime()))){
    d.setDate(d.getDate()-1); while(isWeekend(d)) d.setDate(d.getDate()-1);
    if(!days.has(dayKey(d.getTime()))) return 0;
  }
  let streak=0;
  while(days.has(dayKey(d.getTime()))){
    streak++;
    do{ d.setDate(d.getDate()-1); }while(isWeekend(d));
  }
  return streak;
}
function bestStreak(p){
  const days = [...new Set((p.history||[]).map(h=>dayKey(h.ts)))]
    .map(k=>{const [y,m,da]=k.split("-").map(Number);return new Date(y,m-1,da,12);})
    .filter(d=>!isWeekend(d)).sort((a,b)=>a-b);
  let best=0,run=0,prev=null;
  for(const d of days){
    if(prev){ let n=new Date(prev); do{n.setDate(n.getDate()+1);}while(isWeekend(n));
      run = (dayKey(n)===dayKey(d)) ? run+1 : 1; }
    else run=1;
    best=Math.max(best,run); prev=d;
  }
  return best;
}

function scorePunch(date, streakAfter){
  const h = date.getHours(), wd = date.getDay();
  const parts = [{l:"base",v:10}];
  if(h < 8)            parts.push({l:"madrugador",v:15});
  else if(h >= 17)     parts.push({l:"sobrevivente",v:10});
  if(wd===5 && h>=16)  parts.push({l:"café da virada",v:8});
  if(isWeekend(date))  parts.push({l:"plantão",v:5});
  const sb = Math.min(streakAfter,7)*2;
  if(sb>0)             parts.push({l:`streak ${streakAfter}d`,v:sb});
  return { total: parts.reduce((s,p)=>s+p.v,0), parts };
}

function badgesOf(p){
  const H = p.history||[];
  const has = fn => H.some(h=>fn(new Date(h.ts)));
  return {
    madrugador:  has(d=>d.getHours()<8),
    sobrevivente:has(d=>d.getHours()>=17),
    virada:      has(d=>d.getDay()===5 && d.getHours()>=16),
    maratonista: monthCups(p) >= 20,
    fiel:        currentStreak(p) >= 5,
  };
}
const BADGE_META = {
  madrugador:  {e:"🌅",t:"Madrugador",d:"café antes das 8h"},
  sobrevivente:{e:"🦉",t:"Sobrevivente",d:"café depois das 17h"},
  virada:      {e:"🍻",t:"Café da Virada",d:"sexta no fim do dia"},
  maratonista: {e:"🏃",t:"Maratonista",d:"20+ cafés no mês"},
  fiel:        {e:"🔁",t:"Café Fiel",d:"5 dias úteis seguidos"},
};

const PAL = ["#D6A45C","#E8542F","#7FB069","#5B8DEF","#C77DFF","#F4A261","#2A9D8F","#E07A5F"];
function avColor(id){ let s=0; for(const c of id) s=(s+c.charCodeAt(0))%PAL.length; return PAL[s]; }
function initials(name){ return name.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase(); }
function avatar(p, cls=""){ return `<div class="av ${cls}" style="background:${avColor(p.id)}">${initials(p.name)}</div>`; }

function viewPunch(){
  const now = new Date();
  const me = ME && STATE.people[ME];
  const cdMs = SETTINGS.cooldownMin*60*1000;
  const remaining = me ? (lastPunch(me)+cdMs - Date.now()) : 0;
  const onCooldown = remaining > 0;
  const cups = me ? monthCups(me) : 0;
  const pts  = me ? monthPoints(me) : 0;
  const strk = me ? currentStreak(me) : 0;

  const cap = Math.max(16, Math.ceil((cups+1)/8)*8);
  let cells="";
  for(let i=0;i<cap;i++){
    if(i<cups){
      const rot = ((i*37)%9)-4;
      cells += `<div class="cell on"><svg width="60%" height="60%" viewBox="0 0 24 24" fill="none" style="transform:rotate(${rot}deg)">
        <path d="M4 8h13v5a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5V8Z" stroke="var(--stamp)" stroke-width="2"/>
        <path d="M17 9h2.5a2.5 2.5 0 0 1 0 5H17" stroke="var(--stamp)" stroke-width="2"/>
        <path d="M7 4c0 1-1 1-1 2M11 4c0 1-1 1-1 2" stroke="var(--stamp)" stroke-width="1.6" stroke-linecap="round"/></svg></div>`;
    }else cells += `<div class="cell"></div>`;
  }

  const bg = me ? badgesOf(me) : {};
  const badges = Object.keys(BADGE_META).map(k=>{
    const m=BADGE_META[k], on=bg[k];
    return `<div class="badge ${on?"":"locked"}" title="${m.d}"><span class="e">${m.e}</span>${m.t}</div>`;
  }).join("");

  return `
  <div class="ticket">
    <div class="rcpt-head">
      <div>
        <h2>Cartão de Ponto</h2>
        <div class="sub">${me ? me.name+" · "+me.team : "faça login para registrar"}</div>
      </div>
      <div class="clock">
        <div class="time" id="ledClock">${pad(now.getHours())}:${pad(now.getMinutes())}</div>
        <div class="date" id="ledDate">${now.toLocaleDateString("pt-BR",{weekday:"short",day:"2-digit",month:"short"})}</div>
      </div>
    </div>

    <div class="punch-zone">
      <button class="punch" id="punchBtn" ${(!me||onCooldown)?"disabled":""}>
        <div class="ring"></div>
        <div><span>${onCooldown?"Aguarde":"Bater<br>Ponto"}</span><small>${me?"+10 e bônus":"entre primeiro"}</small></div>
      </button>
      ${ onCooldown
        ? `<div class="cooldown">próximo café liberado em<br><b id="cdText">${fmtRemain(remaining)}</b><div class="hint">evita café fantasma 👻 · 1 ponto a cada ${SETTINGS.cooldownMin}min</div></div>`
        : me ? `<div class="cooldown"><div class="hint">na vida real isto seria o QR code da copa</div></div>`
             : `<div class="cooldown"><div class="hint">toque em “Entrar” no topo para começar</div></div>` }
    </div>

    <div class="stats">
      <div class="stat"><div class="n">${pts}</div><div class="l">pontos / mês</div></div>
      <div class="stat"><div class="n">${cups}</div><div class="l">cafés</div></div>
      <div class="stat"><div class="n">${strk}🔥</div><div class="l">sequência</div></div>
    </div>

    <div class="loyalty">
      <div class="lt"><span>Cartão fidelidade · ${now.toLocaleDateString("pt-BR",{month:"long"})}</span><span>${cups}/${cap}</span></div>
      <div class="grid">${cells}</div>
    </div>

    <div class="badges">${badges}</div>
  </div>

  <div class="kiosk">
    <div class="qr">${qrArt()}</div>
    <p><b>Como rola na copa:</b> cole um QR code (apontando para este link) na máquina de café. Cada scan abre o app e bate o ponto. No fim do mês, sai o <b>Coffee King</b> 👑.</p>
  </div>`;
}

function viewRank(){
  const ppl = Object.values(STATE.people);
  if(ppl.length===0) return emptyState("☕","Ninguém bateu o ponto ainda.","Seja o primeiro a registrar um café.");

  const ranked = ppl.map(p=>({p,pts:monthPoints(p),cups:monthCups(p)}))
                    .sort((a,b)=> b.pts-a.pts || b.cups-a.cups);
  const king = ranked[0];
  const consist = [...ppl].map(p=>({p,v:bestStreak(p)})).sort((a,b)=>b.v-a.v)[0];
  const social  = [...ppl].map(p=>({p,v:p.reactionsGiven||0})).sort((a,b)=>b.v-a.v)[0];
  const newcomers = ppl.filter(p=>{ const f=(p.history||[])[0]; return f && (Date.now()-f.ts) < 14*864e5; });
  const reveal = newcomers.map(p=>({p,v:monthPoints(p)})).sort((a,b)=>b.v-a.v)[0];

  const teams={};
  ppl.forEach(p=>{ teams[p.team]=teams[p.team]||{team:p.team,pts:0,n:0}; teams[p.team].pts+=monthPoints(p); teams[p.team].n++; });
  const teamRanked = Object.values(teams).filter(t=>t.pts>0).sort((a,b)=>b.pts-a.pts);

  const kingBlock = king.pts>0 ? `
    <div class="king">
      <div class="crown">👑</div>
      <div class="ki">
        <div class="t">Coffee King · ${new Date().toLocaleDateString("pt-BR",{month:"long"})}</div>

  let body;
  if(rankMode==="ind"){
    body = `<div class="panel"><h3>Classificação geral</h3><div class="psub">pontos do mês corrente</div>`+
      ranked.map((r,i)=>`

          <div class="pts">${r.pts}<small>pts</small></div>
        </div>`).join("")+`</div>`;
  }else{
    body = `<div class="panel"><h3>Disputa entre setores</h3><div class="psub">soma de pontos por equipe</div>`+
      (teamRanked.length? teamRanked.map((t,i)=>`
        <div class="row">
          <div class="pos">${["🥇","🥈","🥉"][i]||(i+1)}</div>
          <div class="av" style="background:${avColor(t.team)}">${t.team.slice(0,2).toUpperCase()}</div>
          <div class="info"><div class="nm">${t.team}</div><div class="tm">${t.n} pessoa(s)</div></div>
          <div class="pts">${t.pts}<small>pts</small></div>
        </div>`).join("") : `<div class="empty">sem pontos de equipe ainda</div>`)+`</div>`;
  }

  const titles = `
    <div class="panel"><h3>Títulos honorários</h3><div class="psub">nem só de pódio vive a copa</div>
      <div class="titles">
        <div class="ttl"><div class="e">🔁</div><div class="x"><div class="h">Mais Consistente</div>
          <div class="n">${consist&&consist.v>0?consist.p.name:"—"}</div>
          <div class="d">${consist&&consist.v>0?"maior sequência: "+consist.v+" dias":"sem sequências ainda"}</div></div></div>
        <div class="ttl"><div class="e">🌟</div><div class="x"><div class="h">Revelação do Mês</div>
          <div class="n">${reveal&&reveal.v>0?reveal.p.name:"—"}</div>
          <div class="d">${reveal&&reveal.v>0?"chegou agora e já pontua":"aguardando novatos"}</div></div></div>
        <div class="ttl"><div class="e">💬</div><div class="x"><div class="h">Café Social</div>
          <div class="n">${social&&social.v>0?social.p.name:"—"}</div>
          <div class="d">${social&&social.v>0?social.v+" reações no feed":"ninguém reagiu ainda"}</div></div></div>
      </div>
    </div>`;

  return kingBlock + `
    <div class="seg">
      <button data-rank="ind" aria-selected="${rankMode==="ind"}">Individual</button>
      <button data-rank="team" aria-selected="${rankMode==="team"}">Por equipe</button>
    </div>` + body + titles;
}

/* ============================================================
   ações
   ============================================================ */
async function doPunch(){
  if(!ME) return openWho();
  await loadState();
  const me = STATE.people[ME];
  const cdMs = SETTINGS.cooldownMin*60*1000;
  const rem = lastPunch(me)+cdMs - Date.now();
  if(rem>0){ toast("Calma no café! Faltam "+fmtRemain(rem)); render(); return; }

  const now = new Date();
  me.history = me.history||[];
  me.history.push({ts:now.getTime(),pts:0});
  const strk = currentStreak(me);
  me.history.pop();
  const sc = scorePunch(now, strk);
  me.history.push({ts:now.getTime(),pts:sc.total});

  pushFeed(me, sc, strk);
  await saveState();

  stampSlam(sc.total);
  toast(sc.parts.map(p=>`+${p.v} ${p.l}`).join("  ·  ")+`  =  +${sc.total}`);
  render();
}

function pushFeed(me, sc, strk){
  const h=new Date().getHours(), cups=monthCups(me);
  const n = me.name.split(" ")[0];
  const pool=[];
  if(h<8) pool.push(`🌅 <b>${n}</b> bateu o ponto antes das 8h. Que disciplina é essa?`);
  if(h>=17) pool.push(`🦉 <b>${n}</b> tomando café às ${pad(h)}h. Vai dormir quando?`);
  if(strk>=5) pool.push(`🔁 <b>${n}</b> emendou ${strk} dias seguidos de café. Lenda.`);
  if(cups%10===0 && cups>0) pool.push(`🏆 <b>${n}</b> cravou o ${cups}º café do mês. Alguém confere se ainda tá vivo.`);
  pool.push(`☕ <b>${n}</b> bateu o ponto do café (+${sc.total} pts).`);
  pool.push(`<b>${n}</b> abasteceu. Produtividade carregando…`);
  pool.push(`A máquina de café conhece <b>${n}</b> pelo nome.`);
  const text = pool[Math.floor(Math.random()*pool.length)] || pool[0];
  STATE.feed.unshift({id:"f"+Date.now(),uid:me.id,name:me.name,text,ts:Date.now(),reactions:{fire:0,eyes:0}});
  STATE.feed = STATE.feed.slice(0,40);
}

async function react(fid, kind){
  await loadState();
  const f = STATE.feed.find(x=>x.id===fid); if(!f) return;
  f.reactions[kind] = (f.reactions[kind]||0)+1;
  if(ME && STATE.people[ME]){ const me=STATE.people[ME]; me.reactionsGiven=(me.reactionsGiven||0)+1; }
  await saveState();
  render();
}

function sheet(html){ const s=document.getElementById("sheet"); s.innerHTML=html; document.getElementById("scrim").classList.add("on"); }
function closeSheet(){ document.getElementById("scrim").classList.remove("on"); }

/* ============================================================
   efeitos
   ============================================================ */
function stampSlam(total){
  const el=document.getElementById("stamp"), mk=document.getElementById("stampMk");
  mk.innerHTML=`<div class="big">Ponto<br>Batido ✓</div><div class="pts">+${total} pontos</div>`;
  el.classList.remove("fade"); el.classList.add("on");
  void mk.offsetWidth;
  setTimeout(()=>el.classList.add("fade"),900);
  setTimeout(()=>{el.classList.remove("on","fade");},1350);
}
let toastT;
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("on"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("on"),3200); }

function fmtRemain(ms){ const s=Math.max(0,Math.ceil(ms/1000)); const m=Math.floor(s/60); return m>0?`${m}min ${pad(s%60)}s`:`${s}s`; }
function ago(ts){ const s=Math.floor((Date.now()-ts)/1000); if(s<60)return"agora"; const m=Math.floor(s/60); if(m<60)return m+"min"; const h=Math.floor(m/60); if(h<24)return h+"h"; return Math.floor(h/24)+"d"; }

function qrArt(){
  let s=""; const cells=[[2,2],[3,2],[2,3],[4,2],[2,4],[6,2],[7,2],[8,3],[2,6],[3,7],[6,5],[7,6],[8,7],[5,4],[4,6],[6,8],[8,8],[2,8]];
  cells.forEach(([x,y])=>{ s+=`<i style="left:${x*6}px;top:${y*6}px;width:5px;height:5px"></i>`; });
  return s;
}

  document.querySelectorAll(".react button").forEach(b=>b.onclick=()=>{
    b.classList.add("hit"); setTimeout(()=>b.classList.remove("hit"),150);
    react(b.dataset.fid,b.dataset.r);
  });
}
function tickClock(){
  const now=new Date();
  const c=document.getElementById("ledClock"); if(c) c.textContent=pad(now.getHours())+":"+pad(now.getMinutes());
  const d=document.getElementById("ledDate"); if(d) d.textContent=now.toLocaleDateString("pt-BR",{weekday:"short",day:"2-digit",month:"short"});
  const cd=document.getElementById("cdText");
  if(cd && ME && STATE.people[ME]){
    const rem=lastPunch(STATE.people[ME])+SETTINGS.cooldownMin*60*1000-Date.now();
    if(rem<=0){ if(activeTab==="punch") render(); } else cd.textContent=fmtRemain(rem);
  }
}

function bindChrome(){
  document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{ activeTab=t.dataset.tab; render(); });
  document.getElementById("whoBtn").onclick=openWho;

async function init(){
  bindChrome();
  if(typeof supabase === "undefined"){ renderSetup(); toast("Biblioteca do Supabase não carregou"); return; }
  if(!configured()){ renderSetup(); return; }
  db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  await loadState();
  render();
  subscribeRealtime();
  clockTimer=setInterval(tickClock,1000);
  pollTimer=setInterval(poll,15000);
}
